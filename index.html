<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRM Pro Max</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #000; --accent: #00f2ff; --card: #111; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        header { position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; align-items: center; padding: 10px 15px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .logo-img { height: 40px; margin-right: 12px; }
        .search-box { flex: 1; background: rgba(255,255,255,0.1); border-radius: 20px; padding: 7px 15px; display: flex; align-items: center; }
        .search-box input { background: none; border: none; color: white; width: 100%; outline: none; }
        .page { padding-top: 80px; }
        .hero { width: 100%; height: 450px; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding: 20px; background-image: url('https://image.tmdb.org/t/p/original/A7ezFmB0m9PSTp6R61v6YI0uORr.jpg'); }
        .cat-title { padding: 15px; color: var(--accent); font-weight: bold; }
        .scroll-row { display: flex; overflow-x: auto; gap: 10px; padding: 0 15px; }
        .movie-card { min-width: 120px; height: 170px; background: var(--card); border-radius: 8px; flex-shrink: 0; background-size: cover; }
        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; }
        .nav-link { text-align: center; font-size: 10px; color: #555; }
        .nav-link.active { color: var(--accent); }
        .nav-link i { font-size: 22px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>
    <header>
        <img src="https://i.ibb.co/XZpqHLfz/1000007315.jpg" class="logo-img">
        <div class="search-box"><input type="text" placeholder="Procurar..."></div>
    </header>
    <div class="page">
        <div class="hero"><div><h2>The Beekeeper</h2><p>2025 Action</p></div></div>
        <div class="cat-title">DESTAQUES BRM</div>
        <div class="scroll-row">
            <div class="movie-card" style="background-image: url('https://image.tmdb.org/t/p/w500/8Gxv8gSFCU0XGDykEGv7zR1n2ua.jpg')"></div>
            <div class="movie-card" style="background-image: url('https://image.tmdb.org/t/p/w500/geCR7m9vZx8PZ7p2P3pODC6hqoX.jpg')"></div>
            <div class="movie-card" style="background-image: url('https://image.tmdb.org/t/p/w500/6JpUveYVvcl8Sj58vT62vU7U6Uv.jpg')"></div>
        </div>
    </div>
    <nav>
        <div class="nav-link active"><i class="fas fa-home"></i>Home</div>
        <div class="nav-link"><i class="fas fa-bolt"></i>Premium</div>
        <div class="nav-link"><i class="fas fa-user"></i>Me</div>
    </nav>
</body>
</html>
